input {
  beats {
    port => 5044
  }
}

filter {

  # ── Parse app.log lines ────────────────────────────────────────────────────
  if [log][file][path] =~ "app.log" {

    # Extract timestamp, level, message
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level} %{GREEDYDATA:log_message}"
      }
    }

    # Tag login success
    if [log_message] =~ "LOGIN SUCCESS" {
      grok {
        match => {
          "log_message" => "LOGIN SUCCESS: %{WORD:username} from %{IP:client_ip}"
        }
      }
      mutate { add_tag => ["login_success"] add_field => { "event_type" => "login_success" } }
    }

    # Tag login failed
    else if [log_message] =~ "LOGIN FAILED" {
      grok {
        match => {
          "log_message" => "LOGIN FAILED: %{WORD:username} from %{IP:client_ip} \(attempt %{NUMBER:attempt_number}\)"
        }
      }
      mutate { add_tag => ["login_failed"] add_field => { "event_type" => "login_failed" } }
    }

    # Tag brute force
    else if [log_message] =~ "BRUTE FORCE" {
      grok {
        match => {
          "log_message" => "BRUTE FORCE: %{WORD:username} locked after %{NUMBER:attempt_count} failed attempts from %{IP:client_ip}"
        }
      }
      mutate { add_tag => ["brute_force"] add_field => { "event_type" => "brute_force" "severity" => "CRITICAL" } }
    }

    # Tag logout
    else if [log_message] =~ "LOGOUT" {
      grok {
        match => { "log_message" => "LOGOUT: %{WORD:username}" }
      }
      mutate { add_tag => ["logout"] add_field => { "event_type" => "logout" } }
    }

    # Tag user add/delete
    else if [log_message] =~ "USER" {
      mutate { add_tag => ["user_management"] add_field => { "event_type" => "user_management" } }
    }

    mutate { add_field => { "log_source" => "app_log" } }
  }

  # ── Parse alerts.log lines ─────────────────────────────────────────────────
  if [log][file][path] =~ "alerts.log" {
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:alert_timestamp}\] %{GREEDYDATA:alert_message}"
      }
    }

    if [alert_message] =~ "BRUTE FORCE" {
      mutate { add_tag => ["alert_critical"] add_field => { "event_type" => "alert" "severity" => "CRITICAL" } }
    } else if [alert_message] =~ "LOGIN FAILED" {
      mutate { add_tag => ["alert_warning"] add_field => { "event_type" => "alert" "severity" => "WARNING" } }
    } else {
      mutate { add_tag => ["alert_info"] add_field => { "event_type" => "alert" "severity" => "INFO" } }
    }

    mutate { add_field => { "log_source" => "alerts_log" } }
  }

  # ── Parse timestamp ────────────────────────────────────────────────────────
  date {
    match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss,SSS", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
  }

  # ── Add geo IP if client_ip exists ─────────────────────────────────────────
  if [client_ip] {
    geoip { source => "client_ip" }
  }

  # ── Remove unnecessary fields ──────────────────────────────────────────────
  mutate {
    remove_field => ["agent", "ecs", "input", "host"]
  }
}

output {
  # All logs go to app-logs index
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "cloud-monitor-%{+YYYY.MM.dd}"
  }

  # Login events get their own index
  if "login_success" in [tags] or "login_failed" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "login-events-%{+YYYY.MM.dd}"
    }
  }

  # Brute force gets own index
  if "brute_force" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "security-alerts-%{+YYYY.MM.dd}"
    }
  }

  # Debug output in logstash container logs
  stdout { codec => rubydebug }
}